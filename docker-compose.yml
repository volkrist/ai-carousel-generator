services:

  api:
    build: ./backend
    container_name: carousel_api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - minio
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/carousel_db
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_BUCKET: carousel-assets
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

  postgres:
    image: postgres:15
    container_name: carousel_db
    environment:
      POSTGRES_DB: carousel_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"

  minio:
    image: minio/minio
    container_name: carousel_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9100:9000"
      - "9101:9001"
